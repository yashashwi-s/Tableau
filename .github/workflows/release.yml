name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -project Tableau.xcodeproj \
            -scheme Tableau \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=build/Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            build

      - name: Validate Build
        run: |
          APP_PATH="build/Release/Tableau.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Tableau.app not found"
            exit 1
          fi
          SIZE=$(du -sm "$APP_PATH" | cut -f1)
          echo "✅ Tableau.app size: ${SIZE}MB"
          if [ "$SIZE" -lt 1 ]; then
            echo "❌ Build output too small"
            exit 1
          fi

      - name: Package Zip
        run: |
          cd build/Release
          ditto -c -k --sequesterRsrc --keepParent Tableau.app Tableau.app.zip

      - name: Package DMG
        run: |
          hdiutil create \
            -volname "Tableau" \
            -srcfolder build/Release/Tableau.app \
            -ov -format UDZO \
            build/Release/Tableau.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tableau ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/Release/Tableau.app.zip
            build/Release/Tableau.dmg
