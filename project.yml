name: PhotoWidgetOSX
options:
  bundleIdPrefix: com.yashashwi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PhotoWidgetOSX:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yashashwi.photowidgetosx
        PRODUCT_NAME: "Photo Widget OSX"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_CFBundleDisplayName: "Photo Widget OSX"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        INFOPLIST_KEY_LSUIElement: true
