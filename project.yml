name: Tableau
options:
  bundleIdPrefix: com.yashashwi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Tableau:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yashashwi.tableau
        PRODUCT_NAME: "Tableau"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_CFBundleDisplayName: "Tableau"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 2.0.0
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Tableau needs access to your Photos library so you can pick images to display on your desktop."
        INFOPLIST_KEY_NSDesktopFolderUsageDescription: "Tableau needs access to your Desktop to place photo widgets."
        INFOPLIST_KEY_NSDocumentsFolderUsageDescription: "Tableau needs access to your folders to load images."
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: Sources/App/PhotoWidgetOSX.entitlements
        DEVELOPMENT_TEAM: ""
